{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DinoChrome Live</title>
  <link rel="stylesheet" href="{% static 'dinogame/css/styles.css' %}">
  <script>
    window.STATIC_URL = "{% static 'dinogame/' %}";
  </script>
  <style>
    /* ===== 9:16 TIKTOK FRAME ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: white;
      font-family: 'Arial', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .tiktok-frame {
      position: relative;
      width: min(100vw, calc(100vh * 9 / 16));
      height: min(100vh, calc(100vw * 16 / 9));
      margin: auto;
      overflow: hidden;
      background: #f7f7f7;
    }

    /* Safe zone: top ~8% for TikTok header, bottom ~23% for comments/gifts UI */
    .game-safe-zone {
      position: absolute;
      top: 8%;
      bottom: 23%;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    /* ===== DINO GAME OVERRIDES ===== */
    /* Override dinogame/styles.css body flex to not interfere with tiktok frame */
    .game-safe-zone .world {
      overflow: hidden;
      position: relative;
    }

    /* ===== GIFT INDICATORS ===== */
    .gift-indicators {
      display: flex;
      gap: 6px;
      z-index: 60;
      pointer-events: none;
      margin-top: 8px;
    }

    .gift-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 20px;
      padding: 3px 10px 3px 4px;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .gift-indicator img {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }

    .gift-indicator .gi-name {
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .gift-indicator .gi-sep {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.35);
      margin: 0 2px;
    }

    .gift-indicator .gi-action {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.55);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    /* Rosa sin imagen: padding izquierdo extra */
    .gift-indicator.no-img {
      padding-left: 10px;
    }

    .gift-indicator.no-img .gi-name {
      color: #ff69b4;
    }

    /* ===== GIF CONTAINER (ilimitado, posiciones aleatorias) ===== */
    .gif-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 50;
      overflow: hidden;
    }

    .gif-item {
      position: absolute;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      animation: gifFadeIn 0.3s ease forwards;
    }

    .gif-item.removing {
      animation: gifFadeOut 0.5s ease forwards;
    }

    .gif-item img {
      width: 15vw;
      height: 15vw;
      max-width: 120px;
      max-height: 120px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
      filter: drop-shadow(0 0 6px rgba(0, 0, 0, 0.5));
      border-radius: 8px;
    }

    .gif-item .gif-username {
      color: white;
      font-size: 9px;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.9);
      margin-top: 2px;
      padding: 1px 5px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 6px;
      display: inline-block;
    }

    @keyframes gifFadeIn {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes gifFadeOut {
      from { opacity: 1; transform: scale(1); }
      to { opacity: 0; transform: scale(0.3); }
    }

    /* ===== ROSE OVERLAY (inside .world) ===== */
    .rose-overlay {
      position: absolute;
      top: 10%;
      left: 50%;
      transform: translate(-50%, 0) scale(0);
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .rose-overlay.active {
      animation: roseAnimation 3s ease-in-out forwards;
    }

    .rose-overlay .rose-image {
      display: block;
      width: 200px;
      height: auto;
      filter: drop-shadow(0 0 12px rgba(255, 105, 180, 0.8));
    }

    .rose-overlay .rose-text {
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      text-shadow:
        0 0 8px rgba(255, 105, 180, 0.8),
        0 0 16px rgba(255, 105, 180, 0.6),
        1px 1px 3px rgba(0, 0, 0, 0.8);
      margin-top: 0;
      line-height: 1;
      white-space: nowrap;
    }

    @keyframes roseAnimation {
      0% {
        transform: translate(-50%, 0) scale(0) rotate(-180deg);
        opacity: 0;
      }
      15% {
        transform: translate(-50%, 0) scale(1.15) rotate(0deg);
        opacity: 1;
      }
      85% {
        transform: translate(-50%, 0) scale(1) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translate(-50%, 0) scale(0.8) rotate(10deg);
        opacity: 0;
      }
    }

    /* ===== START SCREEN (audio unlock) ===== */
    .start-screen {
      position: absolute;
      inset: 0;
      z-index: 999;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      font-family: 'Arial', sans-serif;
      user-select: none;
    }

    .start-screen .start-icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .start-screen .start-title {
      font-size: clamp(24px, 6vw, 40px);
      font-weight: bold;
      margin-bottom: 10px;
    }

    .start-screen .start-hint {
      font-size: clamp(12px, 3vw, 16px);
      opacity: 0.6;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    /* ===== SSE STATUS ===== */
    .sse-status {
      position: absolute;
      bottom: 24%;
      right: 2%;
      font-size: 9px;
      color: rgba(0,0,0,0.3);
      z-index: 200;
    }

    .sse-status.connected { color: rgba(0,180,0,0.5); }
    .sse-status.error { color: rgba(255,0,0,0.5); }
  </style>
</head>
<body>
  <!-- Audio elements -->
  <audio id="jump-sound" preload="auto">
    <source src="{% static 'dinochrome/effects/jump.mp3' %}" type="audio/mpeg">
  </audio>
  <audio id="point-sound" preload="auto">
    <source src="{% static 'dinochrome/effects/point.mp3' %}" type="audio/mpeg">
  </audio>
  <audio id="tts-audio" preload="none"></audio>
  <audio id="music-audio" preload="none" loop="false"></audio>

  <!-- 9:16 TikTok Frame -->
  <div class="tiktok-frame" id="tiktokFrame">

    <!-- Start screen - required for audio unlock -->
    <div class="start-screen" id="startScreen">
      <div class="start-icon">🦖</div>
      <div class="start-title">DinoChrome Live</div>
      <div class="start-hint">Toca para iniciar</div>
    </div>

    <!-- Safe zone for TikTok Live -->
    <div class="game-safe-zone">
      <!-- Dino Game -->
      <div class="world" data-world>
        <div class="score-container">
          <div class="high-score">RECORD <span data-high-score>0</span></div>
          <div class="score">SCORE <span data-score>0</span></div>
        </div>
        <img src="{% static 'dinogame/imgs/cloud.png' %}" class="cloud" data-cloud>
        <img src="{% static 'dinogame/imgs/cloud.png' %}" class="cloud" data-cloud>
        <img src="{% static 'dinogame/imgs/cloud.png' %}" class="cloud" data-cloud>
        <img src="{% static 'dinogame/imgs/cloud.png' %}" class="cloud" data-cloud>
        <img src="{% static 'dinogame/imgs/cloud.png' %}" class="cloud" data-cloud>
        <img src="{% static 'dinogame/imgs/ground.png' %}" class="ground" data-ground>
        <img src="{% static 'dinogame/imgs/ground.png' %}" class="ground" data-ground>
        <img src="{% static 'dinogame/imgs/dino-stationary.png' %}" class="dino" data-dino>

        <!-- Rose Overlay (inside world) -->
        <div id="roseOverlay" class="rose-overlay">
          <img class="rose-image" src="{% static 'dinochrome_overlays/no-rose.png' %}" alt="No Rose">
          <div class="rose-text" id="roseText">Gracias!</div>
        </div>
      </div>

      <!-- Gift Indicators (inside safe zone, right below the game) -->
      <div class="gift-indicators">
        <div class="gift-indicator">
          <img src="{% static 'dinochrome_overlays/gifts/gg.webp' %}" alt="GG">
          <span class="gi-action">Cambias musica</span>
        </div>
        <div class="gift-indicator no-img">
          <span class="gi-name">Rosa</span>
          <span class="gi-sep">=</span>
          <span class="gi-action">Reinicio</span>
        </div>
        <div class="gift-indicator">
          <img src="{% static 'dinochrome_overlays/gifts/ice_cream.webp' %}" alt="Ice Cream">
          <span class="gi-action">Bailarin</span>
        </div>
      </div>
    </div>

    <!-- GIF Container (ilimitado) -->
    <div class="gif-container" id="gifContainer"></div>


    <!-- SSE Status -->
    <div id="sseStatus" class="sse-status">SSE: conectando...</div>
  </div>

  <!-- Dino game JS (modular) -->
  <script src="{% static 'dinogame/js/script.js' %}" type="module"></script>

  <!-- Override dino world sizing to fit safe zone instead of window -->
  <script>
    (function() {
      const WORLD_WIDTH = 100;
      const WORLD_HEIGHT = 30;

      function resizeWorld() {
        const safeZone = document.querySelector('.game-safe-zone');
        const world = document.querySelector('[data-world]');
        if (!safeZone || !world) return;

        const zoneW = safeZone.clientWidth;
        const zoneH = safeZone.clientHeight;

        let scale;
        if (zoneW / zoneH < WORLD_WIDTH / WORLD_HEIGHT) {
          scale = zoneW / WORLD_WIDTH;
        } else {
          scale = zoneH / WORLD_HEIGHT;
        }

        world.style.width = (WORLD_WIDTH * scale) + 'px';
        world.style.height = (WORLD_HEIGHT * scale) + 'px';
      }

      // Run after dino game script has initialized
      setTimeout(resizeWorld, 100);
      window.addEventListener('resize', resizeWorld);
    })();
  </script>

  <!-- DinoChrome SSE + Overlays + Audio -->
  <script>
    const AVAILABLE_GIFS = JSON.parse('{{ available_gifs_json|safe }}');

    // ===== AUDIO UNLOCK =====
    let audioUnlocked = false;
    const startScreen = document.getElementById('startScreen');

    function unlockAudio() {
      startScreen.remove();
      audioUnlocked = true;

      // Play a silent buffer to unlock audio context (sin tocar tts-audio para no disparar ducking)
      const silentUnlock = new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=');
      silentUnlock.play().then(() => silentUnlock.pause()).catch(() => {});

      // Also unlock game sounds
      const jumpSound = document.getElementById('jump-sound');
      const pointSound = document.getElementById('point-sound');
      if (jumpSound) { jumpSound.play().then(() => jumpSound.pause()).catch(() => {}); }
      if (pointSound) { pointSound.play().then(() => pointSound.pause()).catch(() => {}); }
      const musicEl = document.getElementById('music-audio');
      if (musicEl) { musicEl.play().then(() => musicEl.pause()).catch(() => {}); }

      console.log('[DINOCHROME] Audio desbloqueado');

      // Reproducir musica pendiente o pedir la actual
      setTimeout(() => {
        if (pendingMusic) {
          playMusic(pendingMusic);
          pendingMusic = null;
        } else {
          fetch('/dinochrome/current-music/')
            .then(r => r.json())
            .then(data => {
              if (data.audio_url) playMusic(data);
            })
            .catch(() => {});
        }
      }, 500);
    }

    startScreen.addEventListener('click', unlockAudio);
    document.addEventListener('keydown', function initKey(e) {
      if (startScreen.parentNode) {
        unlockAudio();
        document.removeEventListener('keydown', initKey);
      }
    });

    // ===== GIFS (ilimitado, posiciones aleatorias) =====
    const gifContainer = document.getElementById('gifContainer');
    const GIF_DURATION = 60000;

    function showGif(data) {
      const username = data.username || 'Anonimo';
      const gifFilename = data.gif_filename || 'cat-dancing.gif';

      const el = document.createElement('div');
      el.className = 'gif-item';

      // Posicion aleatoria dentro del frame (0-88% para cubrir esquinas)
      const top = Math.random() * 88;
      const left = Math.random() * 85;
      el.style.top = top + '%';
      el.style.left = left + '%';

      el.innerHTML = `
        <img src="/static/dinochrome_overlays/gifs/${gifFilename}" alt="">
        <div class="gif-username">${username}</div>
      `;

      gifContainer.appendChild(el);

      // Remover despues de la duracion con animacion de salida
      setTimeout(() => {
        el.classList.add('removing');
        setTimeout(() => el.remove(), 500);
      }, GIF_DURATION);
    }

    // ===== ROSE OVERLAY =====
    const roseOverlay = document.getElementById('roseOverlay');
    const roseText = document.getElementById('roseText');

    function showRose(data) {
      const username = data.username || 'Anonimo';

      roseText.textContent = `Gracias ${username}`;

      roseOverlay.classList.remove('active');
      void roseOverlay.offsetWidth;
      roseOverlay.classList.add('active');

      setTimeout(() => {
        roseOverlay.classList.remove('active');
      }, 3000);
    }

    // ===== TTS AUDIO =====
    const ttsAudio = document.getElementById('tts-audio');
    const audioQueue = [];
    let isPlayingAudio = false;

    function playTtsAudio(data) {
      const url = data.audio_url;
      if (!url) return;

      audioQueue.push(url);
      processAudioQueue();
    }

    function processAudioQueue() {
      if (isPlayingAudio || audioQueue.length === 0) return;
      if (!audioUnlocked) {
        console.warn('[DINOCHROME] Audio bloqueado - esperando interaccion del usuario');
        return;
      }

      isPlayingAudio = true;
      const url = audioQueue.shift();

      ttsAudio.src = url;
      ttsAudio.play().then(() => {
        console.log('[DINOCHROME] Reproduciendo TTS:', url);
      }).catch(err => {
        console.error('[DINOCHROME] Error reproduciendo audio:', err);
        isPlayingAudio = false;
        processAudioQueue();
      });
    }

    ttsAudio.addEventListener('ended', () => {
      isPlayingAudio = false;
      processAudioQueue();
    });

    ttsAudio.addEventListener('error', () => {
      isPlayingAudio = false;
      processAudioQueue();
    });

    // ===== MUSIC =====
    const musicAudio = document.getElementById('music-audio');
    musicAudio.volume = 0.7;

    let pendingMusic = null;

    function playMusic(data) {
      const url = data.audio_url;
      if (!url) return;

      if (!audioUnlocked) {
        // Guardar para reproducir despues del unlock
        pendingMusic = data;
        console.log('[DINOCHROME] Musica pendiente (esperando unlock):', data.filename);
        return;
      }

      console.log('[DINOCHROME] playMusic llamado, url:', url, 'unlocked:', audioUnlocked);
      musicAudio.src = url;
      musicAudio.volume = 0.7;
      musicAudio.load();
      const playPromise = musicAudio.play();
      if (playPromise) {
        playPromise.then(() => {
          console.log('[DINOCHROME] Musica reproduciendose:', data.filename || url);
        }).catch(err => {
          console.error('[DINOCHROME] Error reproduciendo musica:', err);
          // Guardar como pendiente si falla por autoplay policy
          pendingMusic = data;
        });
      }
    }

    function stopMusic() {
      musicAudio.pause();
      musicAudio.src = '';
    }

    // Ducking: bajar musica cuando suena TTS, restaurar al terminar
    ttsAudio.addEventListener('playing', () => {
      console.log('[DINOCHROME] TTS playing -> duck musica a 0.35');
      musicAudio.volume = 0.35;
    });
    ttsAudio.addEventListener('ended', () => {
      console.log('[DINOCHROME] TTS ended -> restaurar musica a 0.7');
      musicAudio.volume = 0.7;
    });
    ttsAudio.addEventListener('error', () => {
      musicAudio.volume = 0.7;
    });

    // ===== GAME RESTART =====
    function handleGameRestart() {
      if (typeof window.restartGame === 'function') {
        window.restartGame();
        console.log('[DINOCHROME] Juego reiniciado via SSE');
      }
    }

    // ===== SSE CONNECTION =====
    const sseStatus = document.getElementById('sseStatus');

    function connectSSE() {
      sseStatus.textContent = 'SSE: conectando...';
      sseStatus.className = 'sse-status';

      const eventSource = new EventSource('/dinochrome/events/');

      eventSource.onopen = () => {
        sseStatus.textContent = 'SSE: conectado';
        sseStatus.className = 'sse-status connected';
        console.log('[DINOCHROME] SSE conectado');

        // Pedir cancion actual (por si el music service ya estaba tocando)
        if (audioUnlocked) {
          fetch('/dinochrome/current-music/')
            .then(r => r.json())
            .then(data => {
              if (data.audio_url && !musicAudio.src) {
                playMusic(data);
              }
            })
            .catch(() => {});
        }
      };

      eventSource.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          console.log('[DINOCHROME] Evento:', data);

          switch (data.type) {
            case 'rose_gift':
              showRose(data.data);
              break;
            case 'dancing_gif':
              showGif(data.data);
              break;
            case 'game_restart':
              handleGameRestart();
              break;
            case 'tts_audio':
              playTtsAudio(data.data);
              break;
            case 'music_play':
              playMusic(data.data);
              break;
            case 'music_stop':
              stopMusic();
              break;
            default:
              console.log('[DINOCHROME] Evento desconocido:', data.type);
          }
        } catch (error) {
          console.error('[DINOCHROME] Error parseando evento:', error);
        }
      };

      eventSource.onerror = () => {
        sseStatus.textContent = 'SSE: reconectando...';
        sseStatus.className = 'sse-status error';
        eventSource.close();
        setTimeout(connectSSE, 3000);
      };
    }

    // ===== KEYBOARD TESTING =====
    document.addEventListener('keydown', (e) => {
      switch (e.key) {
        case 'r':
          showRose({ username: 'TestUser', count: 1 });
          break;
        case 'g':
          const gif = AVAILABLE_GIFS[Math.floor(Math.random() * AVAILABLE_GIFS.length)];
          showGif({ username: 'TestUser', gif_filename: gif });
          break;
        case 'x':
          handleGameRestart();
          break;
      }
    });

    connectSSE();
  </script>
</body>
</html>
