{% extends "admin/change_list.html" %}

{% block object-tools-items %}
    <li>
        <form action="{% url 'admin:toggle_debug' %}" method="post" style="display:inline;">
            {% csrf_token %}
            <button type="submit" style="
                background: #e6a117;
                color: white;
                border: none;
                padding: 6px 15px;
                border-radius: 4px;
                cursor: pointer;
                font-size: 13px;
            " onmouseover="this.style.background='#c4880f'" onmouseout="this.style.background='#e6a117'">
                Toggle Debug Overlays
            </button>
        </form>
    </li>
    <li>
        <form action="{% url 'admin:refresh_obs' %}" method="post" style="display:inline;">
            {% csrf_token %}
            <button type="submit" style="
                background: #417690;
                color: white;
                border: none;
                padding: 6px 15px;
                border-radius: 4px;
                cursor: pointer;
                font-size: 13px;
            " onmouseover="this.style.background='#205067'" onmouseout="this.style.background='#417690'">
                Refresh OBS Browser Sources
            </button>
        </form>
    </li>
    {{ block.super }}
{% endblock %}
